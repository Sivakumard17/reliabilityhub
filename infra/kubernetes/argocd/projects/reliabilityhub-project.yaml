apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: reliabilityhub
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  description: ReliabilityHub SRE Platform
  sourceRepos:
    - "https://github.com/Sivakumard17/reliabilityhub.git"
  destinations:
    - namespace: reliabilityhub-system
      server: https://kubernetes.default.svc
    - namespace: observability
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
