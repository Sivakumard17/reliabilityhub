# kube-prometheus-stack values for local kind cluster
# Production values would have larger storage, HA, etc.

fullnameOverride: prometheus

# ── Prometheus ────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Scrape interval
    scrapeInterval: 15s
    evaluationInterval: 15s

    # Retention
    retention: 7d
    retentionSize: "2GB"

    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    # Auto-discover ServiceMonitors from all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    # Auto-discover PodMonitors
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

    # Resource limits
    resources:
      requests:
        memory: "400Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"

    # Additional scrape configs for our API
    additionalScrapeConfigs:
      - job_name: 'reliabilityhub-api'
        static_configs:
          - targets: ['reliabilityhub-api.reliabilityhub-system.svc.cluster.local:9090']
        metrics_path: '/metrics'
        scrape_interval: 15s

# ── Grafana ───────────────────────────────────────────────────────────
grafana:
  enabled: true
  fullnameOverride: grafana

  adminPassword: "reliabilityhub123"

  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  # Persistence
  persistence:
    enabled: true
    size: 1Gi

  # Default dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: UTC

  # Datasources auto-configured
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true
      searchNamespace: ALL

  grafana.ini:
    server:
      root_url: "http://localhost:3001"
    auth.anonymous:
      enabled: false

# ── AlertManager ──────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "128Mi"
        cpu: "100m"

# ── Node Exporter ─────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── Kube State Metrics ────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ── Disable components not needed locally ─────────────────────────────
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
