apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliabilityhub-web
  namespace: reliabilityhub-system
  labels:
    app: reliabilityhub-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reliabilityhub-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: reliabilityhub-web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: localhost:5001/reliabilityhub-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://reliabilityhub-api:9090"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
