apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reliabilityhub
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: reliabilityhub
  source:
    repoURL: https://github.com/Sivakumard17/reliabilityhub.git
    targetRevision: HEAD
    path: infra/kubernetes/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: reliabilityhub-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
